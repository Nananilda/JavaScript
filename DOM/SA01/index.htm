<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Cadastro de Usuário</h2>
    <div>
        <form>
            Nome completo: <br>
            <input type="text" id="nome" placeholder="Digite seu nome completo"><br><br>
            <p id="mensagemEmail"></p>
            E-mail: <br>
            <input type="text" id="email" placeholder="Digite seu e-mail"><br><br>
            Senha: <br>
            <input type="password" id="senha" placeholder="Digite sua senha"><br><br>
            <p id="mensagemSenha"></p>
            <p id="confirmar"></p>
            Endereço: <br>
            <input type="text" id="endereco" placeholder="Digite seu endereço"><br><br>
            Número de telefone: <br>
            <input type="text" id="telefone" placeholder="Digite seu número de telefone"><br><br>
            <button type="button" id="cadastrar">Cadastrar</button>
            <p id="mensagem"></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
